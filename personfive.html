  <script>

function toggleFollow() {
  const btn = document.getElementById("followBtn");
  
  // This adds/removes the .following class every time its click
  btn.classList.toggle("following");

  // This swaps the text based on whether the class is present
  if (btn.classList.contains("following")) { //when button is on following (1)
    btn.innerText = "Following";             //it stays on following (2)
  } else {
    btn.innerText = "Follow";                //if its on follow, it changes to following (3)
  }
}

</script>
