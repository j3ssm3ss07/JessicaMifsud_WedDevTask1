<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Form</title>

  <link rel="stylesheet" href="assets/styles/bootstrap.min.css">
    <link rel="stylesheet" href="assets/styles/bootstrapIndex.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

  <nav>
    <div id="logo-container"></div>   <!--Logo found on the top left -->
  </nav>

  <aside class="sidebar-container"> <!-- Followed profiles will appear here -->
    <div class="friends">
      <a href="friendone.html">
        <img src="assets/friendpfpgirl.png" alt="@laurenannemamo">
      </a>
      <a href="friendtwo.html">
        <img src="assets/friendpfpboy.png" alt="@andreapenza98">
      </a>
    </div>
  </aside>

  <div class="main-wrapper">

    <div class="topbar">
      <a href="index.html">
        <img id="logo" src="assets/logomusic.png" alt="Logo"> <!--Logo will align with the content of the top bar -->
      </a>

      <div class="search-box">                                  <!--Search Bar is found at the centre of the top bar-->
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search...">
      </div>

      <div class="topbar-right">                                <!--Content on the top bar but on the righthand side -->
        <div class="dropdown">    
          <i class="fa-solid fa-bell notification fa-xl"></i>
          <div class="dropdown-content">
            <ul>
              <li><a href="#">No new notifications.</a></li>    <!--Notifications will be found with a dropdown effect -->
            </ul>
          </div>
        </div>

        <div class="dropdown">
          <img class="profile" src="assets/mypfp.png" alt="myProfile"> 
          <div class="dropdown-content">
            <a href="profile.html">Profile</a>
            <a href="contact.html">Contact Form</a>             <!--When your profile is pressed, a dropdown effect will take place including access to your profile and the contact form-->
          </div>
        </div>
      </div>
    </div>

    <div class="container">

      <main class="main-content">

        <div class="categories">  <!--Different Genres found between container and top bar-->
          <a href="new.html" class="categories-button">New</a>
          <a href="pop.html" class="categories-button">Pop</a>
          <a href="rock.html" class="categories-button">Rock</a>
        </div>

        <div class="contact-container">

          <div class="contact-title"> <!--class for the title of the page (For the display of ) -->
            <h1>Contact Form</h1>                                     
          </div>

          
          <form class="contact-form"                                 
                action="mailto:jessica.mifsud.i81047@mcast.edu.mt"
                method="POST"
                enctype="text/plain">  <!--Linking form to email-->                               

            
            <div class="mb-3">
              <label class="form-label">Name</label>
              <input type="text" class="form-control" name="name" placeholder="Teddy Mifsud"> 
            </div>                      
              <!-- Inputting Name -->

            <div class="mb-3">
              <label class="form-label">Email address</label>
              <input type="email" class="form-control" name="email" placeholder="teddy@example.com">  
            </div>
            <!-- Inputting Email -->

            <input type="hidden" id="reason" name="reason">

            
            <div class="mb-3">
              <label class="form-label d-block">Reason for Contact</label> <!-- dropdown -->

              <div class="dropdown">
                <button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenuButton"
                  data-bs-toggle="dropdown">
                  Choose a reason...
                </button>

                
                <ul class="dropdown-menu">    
                  <li><a class="dropdown-item" href="#" data-value="Report a Problem">Report a Problem</a></li>
                  <li><a class="dropdown-item" href="#" data-value="Album Recommendations">Album Recommendations</a></li>
                  <li><a class="dropdown-item" href="#" data-value="Upgrade Suggestions">Upgrade Suggestions</a></li>
                </ul> <!--When button is clicked, drop down will take place-->
              </div>
            </div>

            
            <div class="mb-3">
              <label class="form-label">Message</label>
              <textarea class="form-control" name="message" rows="5"
                placeholder="Write your message here..."></textarea>
            </div>
            <!-- Input Message -->

            <button class="button" type="submit">Submit</button>

          </form>

        </div>

      </main>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Dropdown animation -->
  <script>
    document.querySelectorAll('.dropdown-item').forEach(item => {  //dropdown will function on click
      item.addEventListener('click', function (e) {
        e.preventDefault();

        const selectedValue = this.getAttribute('data-value');
        const selectedText = this.textContent;

        document.getElementById('dropdownMenuButton').textContent = selectedText;
        document.getElementById('reason').value = selectedValue;   //the ability to select a reason and keep it that choice visible
      });
    });
  </script>

</body>
</html>
