 <!-- THE MODAL  -->
  <dialog id="albumModal">
    <div class="album-capsule">
      <button class="back-btn" onclick="closeAlbumModal()" style="size: 20%;">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      
      <div class="modal-art">
        <img id="modalImg" alt="Album Cover style='size: 20%;'>" />
      </div>

      <div class="modal-info">
        <h1 id="modalTitle"></h1>
        <h2 id="modalArtist"></h2>
        <p id="modalDate"></p>
        
        <!-- Countdown box from image_84e980.png -->
        <div id="countdownDisplay" class="countdown-timer"></div>
      </div>
    </div>
  </dialog>

  <!-- JAVA-->
  <script>
    const modal = document.getElementById("albumModal");
    let countdownInterval;

    function openAlbum(image, title, artist, dateString) {
      document.getElementById("modalImg").src = image;
      document.getElementById("modalTitle").innerText = title;
      document.getElementById("modalArtist").innerText = artist;
      document.getElementById("modalDate").innerText = "Expected " + dateString;
      
      startCountdown(dateString);
      modal.showModal(); 
    }

    function startCountdown(dateString) {
      clearInterval(countdownInterval);
      const targetDate = new Date(dateString).getTime();

      countdownInterval = setInterval(() => {
        const now = new Date().getTime();
        const diff = targetDate - now;

        if (diff < 0) {
          document.getElementById("countdownDisplay").innerText = "ALBUM RELEASED";
          clearInterval(countdownInterval);
          return;
        }

        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById("countdownDisplay").innerText = `${d}d ${h}h ${m}m ${s}s remaining`;
      }, 1000);
    }

    function closeAlbumModal() {
      modal.close();
      clearInterval(countdownInterval);
    }

    // Close on clicking background
    modal.addEventListener("click", e => {
      if (e.target === modal) closeAlbumModal();
    });
  </script>
